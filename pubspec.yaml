name: heimwatt
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.0-290.4.beta

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  get: ^4.7.2
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  gap: ^3.0.1
  fluttertoast: ^9.0.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  file_picker: ^10.3.6
  responsive_builder: ^0.7.1
  go_router: ^17.0.0
  toastification: ^3.0.3
  pinput: ^5.0.2
  dotted_border: ^3.1.0
  video_player: ^2.10.1
  video_player_web: ^2.4.0
  google_maps_flutter: ^2.5.0
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_storage: ^13.0.4
  screenshot: ^3.0.0
  syncfusion_flutter_pdfviewer: ^31.2.12
  image_network: ^2.6.0
  html: ^0.15.6

  image: ^4.3.0
  pro_image_editor: ^11.12.2
  shimmer: ^3.0.0
  pdf: ^3.11.1
  printing: ^5.14.2
  flutter_widget_from_html: ^0.17.1
  flutter_dropzone: ^4.2.1
  ffmpeg_kit_flutter_new: ^4.1.0
  path_provider:
  syncfusion_flutter_pdf: ^31.2.16
  flutter_image_compress: ^2.4.0


dev_dependencies:
  build_runner: ^2.4.15
  flutter_gen_runner: ^5.10.0
  flutter_lints: ^6.0.0
  flutter_svg: ^2.1.0
  flutter_test:
    sdk: flutter

flutter_gen:
  integrations:
    flutter_svg: true
    lottie: true

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/video/
    - assets/pdf/

  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-Light.ttf
          weight: 300
        - asset: assets/fonts/Manrope-Regular.ttf
          weight: 400
        - asset: assets/fonts/Manrope-Medium.ttf
          weight: 500
        - asset: assets/fonts/Manrope-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Manrope-Bold.ttf
          weight: 700
        - asset: assets/fonts/Manrope-ExtraBold.ttf
          weight: 800

flutter_intl:
  enabled: true



